<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Club</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main id="password-main">
        <h1>Book Club</h1>
        <form id="password-form">
            <input type="password" id="password-input" placeholder="Password" autocomplete="current-password">
            <button type="submit">Enter</button>
        </form>
        <p id="error-msg"></p>
    </main>

    <script src="js/auth-config.js"></script>
    <script>
        if (localStorage.getItem('bookclub_auth') === CORRECT_HASH) {
            window.location.replace('index.html');
        }

        async function hashPassword(pw) {
            const data = new TextEncoder().encode(pw);
            const buf = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const input = document.getElementById('password-input').value;
            const hash = await hashPassword(input);
            if (hash === CORRECT_HASH) {
                localStorage.setItem('bookclub_auth', CORRECT_HASH);
                window.location.replace('index.html');
            } else {
                document.getElementById('error-msg').textContent = 'Wrong password, try again.';
            }
        });
    </script>
</body>
</html>
